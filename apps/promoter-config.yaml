apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promoter-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/crenshaw-dev/gitops-promoter-demo
    targetRevision: HEAD
    path: promoter-config
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-promoter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

