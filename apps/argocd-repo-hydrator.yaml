apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-repo-hydrator
  namespace: argocd
  annotations:
    # After sealed-secrets (0) and Argo CD (1); hydrator needs repo read/write Secrets before guestbook sync wave 5.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/crenshaw-dev/gitops-promoter-demo
    targetRevision: HEAD
    path: manifests/argocd-repo-hydrator
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
