apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-dex-github
  namespace: argocd
  annotations:
    # Before the argocd Application (wave 2) so Dex OAuth secrets exist when argocd-cm is applied.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/crenshaw-dev/gitops-promoter-demo
    targetRevision: HEAD
    path: manifests/argocd-dex-github
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
