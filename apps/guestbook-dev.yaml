apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: guestbook
    guestbook-env: dev
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  # In-tree Helm chart; hydrator reads/writes this same repo (dry on HEAD, rendered on env/* branches).
  sourceHydrator:
    drySource:
      repoURL: https://github.com/crenshaw-dev/gitops-promoter-demo
      targetRevision: HEAD
      path: demo-apps/guestbook
      helm:
        releaseName: guestbook-dev
        valueFiles:
          - env/dev/values.yaml
    syncSource:
      targetBranch: env/dev
      path: hydrated/guestbook-dev
    hydrateTo:
      targetBranch: env/dev-next
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
