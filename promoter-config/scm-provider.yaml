apiVersion: promoter.argoproj.io/v1alpha1
kind: ScmProvider
metadata:
  name: demo-scm
  namespace: gitops-promoter
spec:
  github:
    # Replace with your GitHub App’s numeric ID (Settings → Developer settings → GitHub Apps → your app).
    appID: 3285420
    # Optional: set if the controller should use a specific installation. If omitted, the controller
    # can discover installations (see https://gitops-promoter.readthedocs.io/en/latest/getting-started/).
    # installationID: 12345678
  secretRef:
    # PEM lives in SealedSecret → Secret; see SETUP.md §12 (charts/gitops-promoter/templates/).
    name: github-app-credentials

